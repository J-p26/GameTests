<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Square Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        #controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        input, button {
            padding: 8px;
            font-size: 16px;
        }
        #grid-container {
            display: grid;
            gap: 0;
            background-color: #333;
            border: 2px solid #333;
            max-width: 90vw;
            max-height: 90vw;
        }
        .grid-cell {
            background-color: white;
            aspect-ratio: 1;
            min-width: 40px;
            min-height: 40px;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .black-square {
            background-color: black;
        }
        .red-square {
            background-color: red;
        }
        .highlight {
            background-color: lightgrey;
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Grid Square Game</h1>
    <div id="controls">
        <label for="grid-size">Grid Size:</label>
        <input type="number" id="grid-size" min="2" max="20" value="10">
        <button id="generate-grid">Generate Grid</button>
    </div>
    <div id="grid-container"></div>
    <div id="status">Click the black square to select it, then click a neighboring light grey square to move it.</div>

    <script>
        let gridSize = 10;
        let selectedSquare = null;
        let grid = [];
        let blackSquareIndex = null;
        let redSquareIndex = null;
        let aiInterval = null;

        function createGrid(size) {
            gridSize = size;
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            grid = Array(size * size).fill(null);

            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                gridContainer.appendChild(cell);
            }

            // Place the black square in the center
            blackSquareIndex = Math.floor(size * size / 2);
            grid[blackSquareIndex] = 'black';

            // Place the red square in a random position (not the center)
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * size * size);
            } while (randomIndex === blackSquareIndex);
            redSquareIndex = randomIndex;
            grid[redSquareIndex] = 'red';

            // Clear any existing AI interval
            if (aiInterval) {
                clearInterval(aiInterval);
            }
            // Start AI movement
            aiInterval = setInterval(moveAISquare, 1000);

            updateGrid();
        }

        function handleCellClick(index) {
            if (selectedSquare === null) {
                // Select the square if it's black
                if (grid[index] === 'black') {
                    selectedSquare = index;
                    highlightNeighbors(index);
                    document.getElementById('status').textContent = `Selected black square. Click a neighboring light grey square to move it.`;
                }
            } else {
                // Move the black square to the new position if it's a neighbor
                if (isNeighbor(selectedSquare, index)) {
                    grid[selectedSquare] = null;
                    grid[index] = 'black';
                    blackSquareIndex = index;
                    selectedSquare = null;
                    clearHighlights();
                    document.getElementById('status').textContent = 'Click the black square to select it, then click a neighboring light grey square to move it.';
                    updateGrid();
                }
            }
        }

        function highlightNeighbors(index) {
            clearHighlights();
            const neighbors = getNeighbors(index);
            neighbors.forEach(neighbor => {
                const cell = document.querySelector(`.grid-cell[data-index="${neighbor}"]`);
                if (cell && grid[neighbor] === null) {
                    cell.classList.add('highlight');
                }
            });
        }

        function clearHighlights() {
            document.querySelectorAll('.highlight').forEach(cell => {
                cell.classList.remove('highlight');
            });
        }

        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / gridSize);
            const col = index % gridSize;

            // Up
            if (row > 0) neighbors.push(index - gridSize);
            // Down
            if (row < gridSize - 1) neighbors.push(index + gridSize);
            // Left
            if (col > 0) neighbors.push(index - 1);
            // Right
            if (col < gridSize - 1) neighbors.push(index + 1);

            return neighbors;
        }

        function isNeighbor(index1, index2) {
            const neighbors = getNeighbors(index1);
            return neighbors.includes(index2);
        }

        function moveAISquare() {
            if (blackSquareIndex === null || redSquareIndex === null) return;

            // Find the shortest path from red to black
            const path = findShortestPath(redSquareIndex, blackSquareIndex);
            if (path.length > 1) {
                // Move one step closer
                const nextIndex = path[1];
                grid[redSquareIndex] = null;
                grid[nextIndex] = 'red';
                redSquareIndex = nextIndex;
                updateGrid();
            }
        }

        function findShortestPath(start, end) {
            const queue = [[start]];
            const visited = new Set([start]);

            while (queue.length > 0) {
                const path = queue.shift();
                const current = path[path.length - 1];

                if (current === end) {
                    return path;
                }

                const neighbors = getNeighbors(current);
                for (const neighbor of neighbors) {
                    if (!visited.has(neighbor) && grid[neighbor] === null) {
                        visited.add(neighbor);
                        queue.push([...path, neighbor]);
                    }
                }
            }

            return [start]; // No path found
        }

        function updateGrid() {
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach((cell, i) => {
                cell.className = 'grid-cell';
                if (grid[i] === 'black') {
                    cell.classList.add('black-square');
                } else if (grid[i] === 'red') {
                    cell.classList.add('red-square');
                }
            });
        }

        document.getElementById('generate-grid').addEventListener('click', () => {
            const size = parseInt(document.getElementById('grid-size').value);
            if (size >= 2 && size <= 20) {
                createGrid(size);
            } else {
                alert('Please enter a grid size between 2 and 20.');
            }
        });

        // Initialize the grid
        createGrid(10);
    </script>
</body>
</html>
